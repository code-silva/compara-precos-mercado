services:
  backend:
    container_name: "django_app"
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    container_name: "react_native_app"
    build: ./frontend
    ports:
      - "8081:8081"
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    tty: true
    stdin_open: true