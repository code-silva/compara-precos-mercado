services:
  redis:
    image: redis:7.4-alpine
    container_name: redis_broker
    ports:
      - "6379:6379"
    restart: always

  backend:
    container_name: "django_app"
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /tmp/flyers:/tmp/flyers
    depends_on:
      - redis

  celery_worker:
    container_name: celery_worker
    build: ./backend
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
      - /tmp/flyers:/tmp/flyers 
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - backend
    restart: always

  celery_beat:
    container_name: celery_beat
    build: ./backend
    command: celery -A core beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - backend
    restart: always

  frontend:
    container_name: "react_native_app"
    build: ./frontend
    ports:
      - "8081:8081"
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    tty: true
    stdin_open: true